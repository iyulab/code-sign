name: _Sign Test (standalone)

# Stage 1 smoke test: builds a tiny .NET hello-world exe, signs it,
# and verifies the signature. Validates that the OIDC + Key Vault path works
# in isolation, before any dispatch handler is built.

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  sign:
    runs-on: windows-latest
    environment: production
    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build dummy exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path work -Force | Out-Null
          Set-Location work
          dotnet new console -n DummyApp --force
          dotnet publish DummyApp/DummyApp.csproj -c Release -r win-x64 --self-contained false -o out
          Get-ChildItem out

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Install AzureSignTool
        run: dotnet tool install --global AzureSignTool

      - name: Sign dummy exe
        shell: pwsh
        run: |
          $token = az account get-access-token --resource https://vault.azure.net --query accessToken -o tsv
          AzureSignTool sign `
            --kvu "https://kv-codesign-iyulab.vault.azure.net/" `
            --kva $token `
            --kvc "globalsign-ev-codesign" `
            --tr "http://timestamp.globalsign.com/tsa/r6advanced1" `
            --verbose `
            "work/out/DummyApp.exe"

      - name: Verify signature (signtool)
        shell: pwsh
        run: |
          $sdkRoot = "C:\Program Files (x86)\Windows Kits\10\bin"
          $signtool = Get-ChildItem -Path $sdkRoot -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match 'x64' } |
            Select-Object -First 1
          if (-not $signtool) { throw "signtool.exe not found" }
          & $signtool.FullName verify /pa /v "work/out/DummyApp.exe"

      - name: Verify signature (PowerShell)
        shell: pwsh
        run: |
          $sig = Get-AuthenticodeSignature "work/out/DummyApp.exe"
          $sig | Format-List *
          if ($sig.Status -ne 'Valid') {
            throw "Signature status: $($sig.Status)"
          }

      - name: Upload signed exe (for inspection)
        uses: actions/upload-artifact@v4
        with:
          name: signed-dummy
          path: work/out/DummyApp.exe
          retention-days: 1
